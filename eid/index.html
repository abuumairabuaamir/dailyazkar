<!DOCTYPE html>
<html lang="en">
<head>
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Eid Greetings - Daily Azkar</title>
    <meta name="description" content="Apne naam ke sath khubsurat Eid Mubarak greetings banayein aur doston ke sath share karein.">

    <meta property="og:title" content="Eid Greeting Generator - Daily Azkar">
    <meta property="og:description" content="Apne naam ke sath khubsurat Eid Mubarak greetings banayein aur doston ke sath share karein.">
    
    <meta property="og:image" content="https://dailyazkar.abuumair.in/eid/thumbnail.jpg">
    <meta property="og:url" content="https://dailyazkar.abuumair.in/eid/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Eid Greeting Generator - Daily Azkar">
    <meta name="twitter:description" content="Apne naam ke sath khubsurat Eid Mubarak greetings banayein aur doston ke sath share karein.">
    <meta name="twitter:image" content="https://dailyazkar.abuumair.in/eid/thumbnail.jpg">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Nastaliq+Urdu&family=Noto+Sans+Bengali&family=Noto+Sans+Devanagari&family=Noto+Sans+Gujarati&family=Noto+Sans+Malayalam&family=Noto+Sans+Tamil&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
 
</head>
<body>

    <div style="font-family: 'Amiri'; display: none;">.</div>
    <div style="font-family: 'Noto Nastaliq Urdu'; display: none;">.</div>
    <div style="font-family: 'Poppins'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Devanagari'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Bengali'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Tamil'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Malayalam'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Gujarati'; display: none;">.</div>

    <div class="container">
        <h1>Eid Greeting Generator</h1>
        
        <select id="languageSelect">
            <option value="arabic">Arabic (العربية)</option>
            <option value="urdu">Urdu (اردو)</option>
            <option value="english">English</option>
            <option value="hindi">Hindi (हिंदी)</option>
            <option value="bangla">Bangla (বাংলা)</option>
            <option value="tamil">Tamil (தமிழ்)</option>
            <option value="malayalam">Malayalam (മലയാളം)</option>
            <option value="gujarati">Gujarati (ગુજરાતી)</option>
        </select>

        <input type="text" id="nameInput" placeholder="Apna Naam Yahan Likhein...">

        <div class="canvas-container">
            <canvas id="greetingCanvas"></canvas>
        </div>

        <button id="downloadBtn">Download Image</button>
    </div>

    <script src="script.js"></script>
</body>
