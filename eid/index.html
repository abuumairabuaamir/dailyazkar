    <meta name="twitter:card" content="summary_large_image">

<body>

    <div style="font-family: 'Amiri'; display: none;">.</div>
    <div style="font-family: 'Noto Nastaliq Urdu'; display: none;">.</div>
    <div style="font-family: 'Poppins'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Devanagari'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Bengali'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Tamil'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Malayalam'; display: none;">.</div>
    <div style="font-family: 'Noto Sans Gujarati'; display: none;">.</div>

    <div class="container">
        <h1>Eid Greeting Generator</h1>
        
        <select id="languageSelect">
            <option value="arabic">Arabic (العربية)</option>
            <option value="urdu">Urdu (اردو)</option>
            <option value="english">English</option>
            <option value="hindi">Hindi (हिंदी)</option>
            <option value="bangla">Bangla (বাংলা)</option>
            <option value="tamil">Tamil (தமிழ்)</option>
            <option value="malayalam">Malayalam (മലയാളം)</option>
            <option value="gujarati">Gujarati (ગુજરાતી)</option>
        </select>

        <input type="text" id="nameInput" placeholder="Enter Your Name Here… ✍️">

        <div class="canvas-container">
            <canvas id="greetingCanvas"></canvas>
        </div>

        <button id="downloadBtn">Download Image</button>
               <button onclick="shareOnWhatsApp()" class="whatsapp-share-btn">
            Share with Friends
        </button>

        <div class="app-promo-banner">
            <div class="app-promo-text">
                Get more Masnoon Azkar and Duas in our official app.
            </div>
            <a href="https://play.google.com/store/apps/details?id=com.abuumair.dailyazkar" class="playstore-button" target="_blank">
                Download Daily Azkar App
            </a>
        </div>

    </div>

    <script src="script.js"></script>
